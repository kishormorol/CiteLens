# Render Blueprint — one-click backend deployment.
# Docs: https://render.com/docs/blueprint-spec
#
# After deploying:
#   1. Note the service URL (e.g. https://citelens-api.onrender.com)
#   2. Fill in OPENALEX_EMAIL and optionally SEMANTIC_SCHOLAR_API_KEY in the Render dashboard
#   3. Set the GitHub secret VITE_API_BASE_URL to that URL so the frontend build picks it up

services:
  - type: web
    name: citelens-api
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: https://kishormorol.github.io
      - key: FALLBACK_TO_MOCK_ON_ERROR
        value: "true"
      - key: ARXIV_USER_AGENT
        value: "CiteLens/1.0"
      # Set these in the Render dashboard — do not commit real values here
      - key: OPENALEX_EMAIL
        sync: false
      - key: SEMANTIC_SCHOLAR_API_KEY
        sync: false
